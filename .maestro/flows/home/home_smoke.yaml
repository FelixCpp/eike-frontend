appId: com.example.eike_frontend
name: Home – Smoke Test
tags:
  - smoke
---
- launchApp:
    clearState: true
    stopApp: true

# Prüfe, dass der Home-Screen vorhanden ist
# anhand von AppBar-Titel, weil Inhalte dynamisch geladen
- assertVisible: "Meine 7 Sachen"
- takeScreenshot: "home/home_screen"

# Prüfe, dass BottomNavBar da ist (über Icon oder Tap-Test)
- tapOn:
    point: "50%,95%" # Kontakt-Tab (Mitte unten)

# Prüfe, dass der Kontakt-Screen vorhanden ist
- assertVisible: "Kontakt" # Sollte jetzt im AppBar stehen
- assertVisible: "Akute Krise?"
- assertVisible: "Notfall-Kontakte"
- takeScreenshot: "contact/contact_screen"

# Prüfe, dass der Einstellungen-Screen vorhanden ist
- tapOn:
    point: "85%,95%" # Einstellungen-Tab
- assertVisible: "Einstellungen"
- assertVisible: "Einsatznachsorgeteam"
- assertVisible: "Datenschutz & Sicherheit"
- takeScreenshot: "settings/settings_screen"
